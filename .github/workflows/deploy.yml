name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - app1
          - app2

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.PROJECT_DIR }}

            echo "Pulling latest code..."
            git pull origin main

            echo "Deploying target: ${{ github.event.inputs.target }}"

            if [ "${{ github.event.inputs.target }}" = "all" ]; then
              docker compose up -d --build app1 app2 nginx
            elif [ "${{ github.event.inputs.target }}" = "app1" ]; then
              docker compose up -d --build app1
            elif [ "${{ github.event.inputs.target }}" = "app2" ]; then
              docker compose up -d --build app2
            fi

            echo "Cleaning up unused images..."
            docker image prune -f

            echo "Deploy complete."
