name: Publish Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish Packages'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all publishable packages
        run: bun run build --filter=!@viseed/docs --filter=!@viseed/starter

      - name: Verify admin bundle is packaged into core and umbrella
        run: |
          test -f packages/core/dist/admin/index.html || { echo "::error::Missing packages/core/dist/admin/index.html — admin UI was not built/copied into @viseed/core"; exit 1; }
          test -f packages/viseed/dist/admin/index.html || { echo "::error::Missing packages/viseed/dist/admin/index.html — admin UI was not copied into @viseed/cms"; exit 1; }
          echo "Admin bundle present in @viseed/core and @viseed/cms"

      - name: Lint publish config of every publishable package (publint)
        run: |
          set -e
          for pkg in \
            packages/types packages/schema packages/validator packages/registry \
            packages/ui packages/core packages/viseed \
            plugins/plugin-auth plugins/plugin-blog plugins/plugin-menu \
            plugins/plugin-pages plugins/plugin-common-widgets \
            themes/theme-blog themes/theme-insurance; do
            echo "== publint $pkg =="
            bunx publint "$pkg"
          done

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: bun run publish-packages
          version: bun run version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
