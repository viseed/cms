name: viseed-cms

# Shared logging config — rotate at 10 MB, keep 5 files per service
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  insurance:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.insurance
    environment:
      - NODE_EXTRA_CA_CERTS=/app/ca-certificate.crt
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./ca-certificate.crt:/app/ca-certificate.crt:ro
      - ./uploads:/app/uploads:rw
      - ./.turbo:/app/.turbo:rw
    restart: unless-stopped
    logging: *default-logging
    networks:
      - cms-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # stop_grace_period: 30s
    # deploy:
    #   replicas: 2
    #   update_config:
    #     parallelism: 1
    #     delay: 15s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      insurance:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    networks:
      - cms-network

networks:
  cms-network:
    driver: bridge
